<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SHISHKA — Grand Opening posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,300..800;1,400..600&display=swap" rel="stylesheet" />
<style>
  :root{
    --green:#3A4A1C; --green-900:#212C0E; --green-100:#E7EFD6;
    --red:#B62A23; --purple:#511A52;
    --cream:#F5EEDF; --cream-50:#FBF8F0; --honey:#E0A93B;
    --ink:#1B1E14;
    --font:-apple-system,"SF Pro Display","Albert Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#222;font-family:var(--font);color:var(--ink);padding:32px;display:flex;flex-wrap:wrap;gap:32px;justify-content:center;align-items:flex-start}
  .note{width:100%;max-width:1080px;color:#eee;font-size:15px;line-height:1.6;background:#000;border-left:4px solid var(--honey);padding:14px 18px;border-radius:8px}
  .note b{color:var(--honey)}
  figure{margin:0}
  figcaption{color:#bbb;font-size:13px;text-align:center;margin-top:8px;letter-spacing:.06em;text-transform:uppercase}

  /* ---- frames ---- */
  .frame{position:relative;overflow:hidden;color:var(--cream);border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .post{width:1080px;height:1350px}      /* 4:5 feed */
  .story{width:1080px;height:1920px}     /* 9:16 story / reel */
  .pad{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;text-align:center;padding:96px 80px}
  .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .wash{position:absolute;inset:0}
  .wash-green{background:linear-gradient(180deg,rgba(33,44,14,.55) 0%,rgba(33,44,14,.30) 38%,rgba(33,44,14,.86) 100%)}

  .logo{height:120px;object-fit:contain}
  .logo-sm{height:84px;object-fit:contain}
  .eyebrow{font-size:30px;letter-spacing:.42em;text-transform:uppercase;font-weight:600;opacity:.92}
  .display{font-weight:800;line-height:.94;letter-spacing:-.02em;text-transform:uppercase}
  .d-xl{font-size:150px}
  .d-lg{font-size:118px}
  .d-md{font-size:88px}
  .spacer{flex:1}
  .rule{width:120px;height:4px;background:var(--cream);opacity:.6;border:none;border-radius:2px}
  .meta{font-size:46px;font-weight:700;letter-spacing:.01em}
  .meta-sub{font-size:34px;font-weight:500;opacity:.92}
  .pill{display:inline-block;background:var(--red);color:#fff;font-weight:800;font-size:42px;letter-spacing:.02em;padding:22px 46px;border-radius:999px;text-transform:uppercase;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .footer-line{font-size:30px;letter-spacing:.30em;text-transform:uppercase;opacity:.85}
  .stack{display:flex;flex-direction:column;align-items:center;gap:28px}

  /* Post B — manakish on cream */
  .cream-bg{background:var(--cream-50);color:var(--ink)}
  .row3{display:flex;gap:36px;width:100%;justify-content:center}
  .chip{flex:1;display:flex;flex-direction:column;align-items:center;gap:18px}
  .chip img{width:280px;height:280px;border-radius:50%;object-fit:cover;border:8px solid #fff;box-shadow:0 10px 28px rgba(0,0,0,.18)}
  .chip span{font-size:30px;font-weight:700;color:var(--green)}
  .bottombar{position:absolute;left:0;right:0;bottom:0;background:var(--green);color:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:40px 64px}
  .bottombar .meta{font-size:40px}

  /* Post C / story — solid green */
  .green-bg{background:var(--green)}
  .circle-img{width:520px;height:520px;border-radius:50%;object-fit:cover;border:10px solid rgba(255,255,255,.14)}
  .quote{font-size:96px;font-weight:800;line-height:1.02;text-transform:uppercase;letter-spacing:-.01em}
  .red-bg{background:var(--red)}

  @media print{body{background:#fff;padding:0;gap:0}.note,figcaption{display:none}.frame{box-shadow:none;border-radius:0;break-after:page}}
</style>
</head>
<body>

  <div class="note">
    <b>How to export:</b> these are exact Instagram sizes (feed&nbsp;1080×1350, story/reel&nbsp;1080×1920).
    Open this file in Chrome, zoom so a frame fills the screen, and screenshot it — or right-click → <i>Inspect</i>,
    use the device toolbar to capture each frame at full size. Photos &amp; logo load from <code>../../public/assets/</code>.
  </div>

  <!-- ============ POST A — ANNOUNCEMENT (4:5) ============ -->
  <figure>
    <div class="frame post">
      <img class="photo" src="../../public/assets/hero-saladbar.jpg" alt="" />
      <div class="wash wash-green"></div>
      <div class="pad">
        <img class="logo" src="../../public/assets/logo-full-white.png" alt="SHISHKA" />
        <div style="height:40px"></div>
        <div class="eyebrow">Seed oil &amp; gluten free</div>
        <div style="height:36px"></div>
        <div class="display d-xl">Grand<br>Opening</div>
        <div style="height:28px"></div>
        <div class="meta-sub">Rawai · Phuket</div>
        <div class="spacer"></div>
        <div class="stack">
          <hr class="rule" />
          <div class="meta">SUN 14 JUNE · 9AM–6PM</div>
          <div class="meta-sub">📍 Soi Naya 2 — next to TOPS Daily</div>
          <div style="height:10px"></div>
          <div class="pill">20% off · first 50 guests</div>
        </div>
        <div class="spacer"></div>
        <div class="footer-line">from the soil to the soul</div>
      </div>
    </div>
    <figcaption>Post A · Announcement · 1080×1350</figcaption>
  </figure>

  <!-- ============ POST B — MANAKISH (4:5) ============ -->
  <figure>
    <div class="frame post cream-bg">
      <div class="pad" style="justify-content:flex-start;padding-top:120px">
        <div class="eyebrow" style="color:var(--green);opacity:1">Made daily</div>
        <div style="height:30px"></div>
        <div class="display d-lg" style="color:var(--green)">Manakish,<br>done right</div>
        <div style="height:24px"></div>
        <div class="meta-sub" style="color:var(--ink);opacity:.8;font-size:34px;max-width:760px">Sourdough base · clean ingredients · zero seed oils</div>
        <div style="height:80px"></div>
        <div class="row3">
          <div class="chip"><img src="../../public/assets/menu/manakish-zaatar.png" alt=""><span>Za'atar</span></div>
          <div class="chip"><img src="../../public/assets/menu/manakish-cheese-olive.png" alt=""><span>Cheese &amp; Olive</span></div>
          <div class="chip"><img src="../../public/assets/menu/manakish-beef.png" alt=""><span>Beef</span></div>
        </div>
      </div>
      <div class="bottombar">
        <div class="meta">Grand opening · Sun 14 June</div>
        <img class="logo-sm" src="../../public/assets/logo-full-white.png" alt="SHISHKA" />
      </div>
    </div>
    <figcaption>Post B · Manakish · 1080×1350</figcaption>
  </figure>

  <!-- ============ POST C — BRAND STORY (4:5) ============ -->
  <figure>
    <div class="frame post green-bg">
      <div class="pad">
        <img class="logo-sm" src="../../public/assets/logo-full-white.png" alt="SHISHKA" />
        <div class="spacer"></div>
        <img class="circle-img" src="../../public/assets/cat/nutrition-bowl.png" alt="" />
        <div style="height:56px"></div>
        <div class="quote">From the soil<br>to the soul</div>
        <div style="height:28px"></div>
        <div class="meta-sub" style="max-width:740px">Unprocessed, gluten-free, seed-oil-free — food that loves you back.</div>
        <div class="spacer"></div>
        <div class="meta" style="font-size:40px">Grand opening · Sun 14 June · Rawai</div>
      </div>
    </div>
    <figcaption>Post C · Brand story · 1080×1350</figcaption>
  </figure>

  <!-- ============ REEL COVER / STORY — DETAILS (9:16) ============ -->
  <figure>
    <div class="frame story green-bg">
      <div class="pad" style="padding:140px 90px">
        <img class="logo" src="../../public/assets/logo-full-white.png" alt="SHISHKA" />
        <div class="spacer"></div>
        <div class="eyebrow">Seed oil &amp; gluten free</div>
        <div style="height:40px"></div>
        <div class="display d-xl">Grand<br>Opening</div>
        <div style="height:60px"></div>
        <hr class="rule" />
        <div style="height:48px"></div>
        <div class="meta" style="font-size:58px">SUN 14 JUNE</div>
        <div style="height:18px"></div>
        <div class="meta-sub" style="font-size:44px">9AM – 6PM</div>
        <div style="height:18px"></div>
        <div class="meta-sub" style="font-size:38px">📍 Soi Naya 2, Rawai · next to TOPS Daily</div>
        <div style="height:56px"></div>
        <div class="pill" style="font-size:48px">20% off · first 50 guests 🎉</div>
        <div class="spacer"></div>
        <div class="footer-line">from the soil to the soul</div>
      </div>
    </div>
    <figcaption>Reel cover / Details story · 1080×1920</figcaption>
  </figure>

</body>
</html>
